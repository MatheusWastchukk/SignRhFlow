<header *ngIf="!isSigningRoute" class="bg-slate-100/80">
  <div class="mx-auto flex w-full max-w-[min(100%,100rem)] items-center justify-between px-4 sm:px-6 lg:px-8 py-5">
    <a routerLink="/dashboard" class="inline-flex items-center gap-2">
      <span class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-blue-600 text-sm font-bold text-white">s</span>
      <span class="text-sm font-semibold text-slate-700">signrhflow</span>
    </a>

    <div class="flex items-center gap-3">
      <a
        *ngIf="!isAuthenticated"
        routerLink="/login"
        routerLinkActive="bg-white text-slate-900 ring-slate-300"
        class="rounded-md bg-white/60 px-4 py-2 text-sm font-semibold text-slate-600 ring-1 ring-transparent transition hover:bg-white hover:text-slate-900"
      >
        Entrar
      </a>
      <button
        *ngIf="isAuthenticated"
        type="button"
        (click)="logout()"
        class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700"
      >
        Sair
      </button>
    </div>
  </div>

  <div *ngIf="isAuthenticated" class="mx-auto flex w-full max-w-[min(100%,100rem)] items-center gap-3 px-4 sm:px-6 lg:px-8 pb-4">
    <a
      routerLink="/dashboard"
      routerLinkActive="!bg-blue-600 !text-white"
      class="rounded-full bg-white px-4 py-2 text-xs font-semibold text-slate-700 ring-1 ring-slate-200 transition hover:bg-blue-50"
    >
      Dashboard
    </a>
    <a
      routerLink="/contracts/new"
      routerLinkActive="!bg-blue-600 !text-white"
      class="rounded-full bg-white px-4 py-2 text-xs font-semibold text-slate-700 ring-1 ring-slate-200 transition hover:bg-blue-50"
    >
      Novo contrato
    </a>
  </div>
</header>

<main *ngIf="!isSigningRoute; else signingLayout" class="min-h-screen bg-slate-100 pb-10">
  <div class="mx-auto w-full max-w-[min(100%,100rem)] min-w-0 px-4 sm:px-6 lg:px-8 pt-6">
    <router-outlet />
  </div>
</main>

<ng-template #signingLayout>
  <main class="min-h-screen bg-slate-100 pb-10">
    <div class="mx-auto w-full max-w-[min(100%,100rem)] min-w-0 px-4 sm:px-6 lg:px-8 pt-6">
      <router-outlet />
    </div>
  </main>
</ng-template>
