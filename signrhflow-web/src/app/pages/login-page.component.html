<section class="mx-auto mt-8 max-w-md space-y-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="space-y-1 text-center">
    <h1 class="text-2xl font-bold text-slate-900">Login do dashboard</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <label class="block space-y-1">
      <span class="text-sm font-medium text-slate-700">Usuario</span>
      <input
        type="text"
        formControlName="login"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none"
      />
    </label>

    <label class="block space-y-1">
      <span class="text-sm font-medium text-slate-700">Senha</span>
      <input
        type="password"
        formControlName="password"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none"
      />
    </label>

    <button
      type="submit"
      [disabled]="loading"
      class="w-full rounded-md bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-blue-300"
    >
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>

  <p *ngIf="error" class="rounded-md bg-rose-100 px-4 py-3 text-sm text-rose-700">{{ error }}</p>
</section>
