services:
  api:
    build:
      context: ./signrhflow-api
      dockerfile: Dockerfile
    container_name: signrhflow_api
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./signrhflow-api:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - signrhflow-network

  queue:
    build:
      context: ./signrhflow-api
      dockerfile: Dockerfile
    container_name: signrhflow_queue
    working_dir: /var/www/html
    command: php artisan queue:work --queue=contracts,webhooks --tries=5 --sleep=1
    volumes:
      - ./signrhflow-api:/var/www/html
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - signrhflow-network

  # Front: `ng build` + Nginx (estático). Rebuild após mudar código: docker compose build web --no-cache
  # WEB_BUILD_NG_API_URL no .env da raiz (opcional) define a API embutida no JS.
  web:
    build:
      context: ./signrhflow-web
      dockerfile: Dockerfile
      args:
        NG_API_URL: ${WEB_BUILD_NG_API_URL:-https://matheuswastchuk.tech/SignRhFlow/api}
    image: signrhflow_web:latest
    container_name: signrhflow_web
    ports:
      - "127.0.0.1:4200:80"
    networks:
      - signrhflow-network

  db:
    image: postgres:16-alpine
    container_name: signrhflow_db
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: signrhflow
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - signrhflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d signrhflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - signrhflow-network

  redis:
    image: redis:7-alpine
    container_name: signrhflow_redis
    volumes:
      - signrhflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - signrhflow-network

networks:
  signrhflow-network:
    driver: bridge

volumes:
  signrhflow-db-data:
  signrhflow-redis-data:
